<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/resized-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geeks POS</title>
    <style>
      html, body, #root { height: 100%; }
      html, body { margin: 0; background: #020617; }
      .boot-fallback {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e2e8f0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .boot-box { text-align: center; display: grid; gap: 12px; }
      .spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto;
        border: 4px solid #334155;
        border-top-color: #10b981;
        border-radius: 9999px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-fallback">
        <div class="boot-box">
          <div class="spinner"></div>
          <div>Geeks POS yuklanmoqda...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
